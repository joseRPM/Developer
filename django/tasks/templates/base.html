<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Django CRUD app</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">Django App</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li>
              <a href="/" class="nav-link">Home</a>
            </li>

            {% if user.is_authenticated %}
            <li class="nav-item">
              <a href="{% url 'task.url' %}" class="nav-link"
                >Tareas pendientes</a
              >
            </li>
            <li class="nav-item">
              <a href="{% url 'task_completed' %}" class="nav-link"
                >Tareas completadas</a
              >
            </li>
            <li class="nav-item">
              <a href="/task/create" class="nav-link">Crear tarea</a>
            </li>

            <li class="nav-item">
              <a href="/logout" class="nav-link">Cerrar sesion</a>
            </li>
            {% else %}
            <li class="nav-item">
              <a href="/signup" class="nav-link">Registrarse</a>
            </li>
            <li class="nav-item">
              <a href="/signin" class="nav-link">Ingresar</a>
              <!--Ingreso por cuenta ya existente -->
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    {% block content %} {% endblock %}
  </body>
</html>
